openapi: 3.0.3
info:
  title: OSA-BusinessOS Integration API
  description: |
    API specification for integration between BusinessOS and OSA-5.

    **Architecture:** Dual System
    - OSA-5: Handles application generation (21-agent workflow)
    - BusinessOS: Handles business operations (CRM, Projects, Tasks)
    - Integration: REST API with JWT authentication
  version: 1.0.0
  contact:
    name: BusinessOS Team

servers:
  - url: http://localhost:8089
    description: OSA Local Development
  - url: https://stable-orchestrator-621507424676.us-central1.run.app
    description: OSA Production (GCP Cloud Run)

security:
  - BearerAuth: []
  - UserContext: []

paths:
  /health:
    get:
      summary: Health Check
      description: Check if OSA service is healthy and reachable
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/apps/generate:
    post:
      summary: Generate Application
      description: Trigger OSA to generate a new application (module, tool, or full-stack app)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppGenerationRequest'
      responses:
        '200':
          description: App generation initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppGenerationResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/apps/{appId}/status:
    get:
      summary: Get App Generation Status
      description: Check the status of an ongoing or completed app generation
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatusResponse'
        '404':
          description: App not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orchestrate:
    post:
      summary: Run 21-Agent Orchestration
      description: Execute the full OSA 21-agent workflow for complex tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestrateRequest'
      responses:
        '200':
          description: Orchestration completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrateResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/workspaces:
    get:
      summary: List Workspaces
      description: Get all workspaces for the authenticated user
      responses:
        '200':
          description: Workspaces retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacesResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token generated by BusinessOS with shared secret.
        Token contains: user_id, workspace_id (optional), exp, iat, iss

    UserContext:
      type: apiKey
      in: header
      name: X-User-ID
      description: User UUID passed in header for context

  schemas:
    AppGenerationRequest:
      type: object
      required:
        - user_id
        - workspace_id
        - name
        - description
        - type
      properties:
        user_id:
          type: string
          format: uuid
          description: ID of the user requesting app generation
        workspace_id:
          type: string
          format: uuid
          description: ID of the workspace where app will be created
        name:
          type: string
          description: Name of the application to generate
          example: "Task Management System"
        description:
          type: string
          description: Natural language description of desired application
          example: "A task management system with Kanban boards, due dates, and team collaboration"
        type:
          type: string
          enum: [full-stack, module, tool]
          description: Type of application to generate
        parameters:
          type: object
          additionalProperties: true
          description: Additional parameters for generation

    AppGenerationResponse:
      type: object
      properties:
        app_id:
          type: string
          format: uuid
          description: Unique ID for the generated app
        status:
          type: string
          enum: [pending, processing, completed, failed]
          description: Current status of generation
        workspace_id:
          type: string
          format: uuid
        message:
          type: string
          description: Human-readable status message
        data:
          type: object
          additionalProperties: true
          description: Additional response data
        created_at:
          type: string
          format: date-time

    AppStatusResponse:
      type: object
      properties:
        app_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Progress from 0.0 to 1.0
        current_step:
          type: string
          description: Description of current generation step
        output:
          type: string
          description: Generated output or logs
        error:
          type: string
          description: Error message if status is failed
        metadata:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time

    OrchestrateRequest:
      type: object
      required:
        - user_id
        - input
      properties:
        user_id:
          type: string
          format: uuid
        input:
          type: string
          description: Natural language input for orchestration
        phase:
          type: string
          enum: [analysis, strategy, development, testing, deployment, monitoring, optimization]
          description: Specific phase to execute (optional)
        context:
          type: object
          additionalProperties: true
          description: Additional context for orchestration
        workspace_id:
          type: string
          format: uuid

    OrchestrateResponse:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
          description: Generated output from orchestration
        agents_used:
          type: array
          items:
            type: string
          description: List of agents that participated
        execution_ms:
          type: integer
          format: int64
          description: Execution time in milliseconds
        data:
          type: object
          additionalProperties: true
        next_step:
          type: string
          description: Suggested next action

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspacesResponse:
      type: object
      properties:
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        total:
          type: integer

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: string
          description: Additional error details
