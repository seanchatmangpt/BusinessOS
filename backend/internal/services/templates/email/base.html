<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{.Subject}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style type="text/css">
        /* Reset */
        body, table, td, p, a, li, blockquote {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }
        
        /* Base Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #374151;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            width: 100% !important;
            min-width: 100%;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Container */
        .wrapper {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 0 0 32px 0;
        }
        .header img {
            height: 32px;
            width: auto;
        }
        .header-text {
            font-size: 22px;
            font-weight: 700;
            color: #6366f1;
            letter-spacing: -0.3px;
        }
        
        /* Card */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px 32px;
            border: 1px solid #e5e7eb;
        }
        
        /* Typography */
        h1 {
            color: #111827;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 20px 0;
            line-height: 1.3;
            letter-spacing: -0.3px;
        }
        h2 {
            color: #1f2937;
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 12px 0;
        }
        h3 {
            color: #374151;
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        p {
            color: #6b7280;
            font-size: 15px;
            margin: 0 0 16px 0;
            line-height: 1.6;
        }
        .text-muted {
            color: #9ca3af;
        }
        .text-small {
            font-size: 13px;
        }
        .text-xs {
            font-size: 12px;
        }
        .text-center {
            text-align: center;
        }
        strong {
            color: #374151;
            font-weight: 600;
        }
        
        /* Accent */
        .accent {
            color: #6366f1;
        }
        
        /* Buttons */
        .button-wrapper {
            text-align: center;
            margin: 28px 0;
        }
        .button {
            display: inline-block;
            background: #6366f1;
            color: #ffffff !important;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            line-height: 1;
        }
        .button-secondary {
            background: #f3f4f6;
            color: #374151 !important;
        }
        .button-success {
            background: #10b981;
        }
        .button-danger {
            background: #ef4444;
        }
        
        /* Info Box */
        .info-box {
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
        }
        .info-box.warning {
            background: #fffbeb;
        }
        .info-box.danger {
            background: #fef2f2;
        }
        .info-box.success {
            background: #ecfdf5;
        }
        .info-box.accent {
            background: #f5f3ff;
        }
        
        /* Code Box */
        .code-box {
            background: #f3f4f6;
            color: #6366f1;
            font-family: 'SF Mono', 'Fira Code', Monaco, 'Courier New', monospace;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 6px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        .code-label {
            text-align: center;
            color: #9ca3af;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-default {
            background: #f3f4f6;
            color: #6b7280;
        }
        .badge-accent {
            background: #eef2ff;
            color: #6366f1;
        }
        .badge-success {
            background: #ecfdf5;
            color: #059669;
        }
        .badge-warning {
            background: #fffbeb;
            color: #d97706;
        }
        .badge-danger {
            background: #fef2f2;
            color: #dc2626;
        }
        
        /* Link Fallback */
        .link-fallback {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .link-fallback p {
            color: #9ca3af;
            font-size: 12px;
            margin: 0 0 6px 0;
        }
        .link-fallback a {
            color: #6366f1;
            word-break: break-all;
            font-size: 12px;
        }
        
        /* Details */
        .details-list {
            margin: 16px 0;
        }
        .details-list dt {
            color: #9ca3af;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }
        .details-list dt:first-child {
            margin-top: 0;
        }
        .details-list dd {
            color: #374151;
            margin: 4px 0 0 0;
            font-size: 14px;
        }
        
        /* Step */
        .step {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
        }
        .step-number {
            width: 24px;
            height: 24px;
            background: #eef2ff;
            color: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
            margin-right: 12px;
        }
        .step-content h4 {
            margin: 0 0 2px 0;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }
        .step-content p {
            margin: 0;
            font-size: 13px;
            color: #9ca3af;
        }
        
        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }
        
        /* Highlight */
        .highlight {
            background: #eef2ff;
            color: #6366f1;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .highlight h3 {
            color: #4f46e5;
            margin: 0;
        }
        .highlight p {
            color: #6366f1;
            margin: 6px 0 0 0;
            font-size: 13px;
        }
        
        /* Avatar */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eef2ff;
            color: #6366f1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px 0;
        }
        .footer p {
            color: #9ca3af;
            font-size: 12px;
            margin: 4px 0;
        }
        .footer a {
            color: #6b7280;
            text-decoration: none;
        }
        .footer a:hover {
            color: #6366f1;
        }
        .footer-links {
            margin: 12px 0;
        }
        .footer-links a {
            margin: 0 10px;
            font-size: 12px;
        }
        .footer-divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 20px 0;
        }
        
        /* Responsive */
        @media only screen and (max-width: 600px) {
            .wrapper {
                padding: 24px 16px;
            }
            .card {
                padding: 28px 20px;
            }
            h1 {
                font-size: 22px;
            }
            .button {
                padding: 12px 24px;
            }
            .code-box {
                font-size: 24px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
            <td>
                <div class="wrapper">
                    <!-- Header with Logo -->
                    <div class="header">
                        {{if .LogoURL}}
                        <img src="{{.LogoURL}}" alt="OSA" />
                        {{else}}
                        <span class="header-text">OSA</span>
                        {{end}}
                    </div>
                    
                    <!-- Main Card -->
                    <div class="card">
                        {{template "content" .}}
                    </div>
                    
                    <!-- Footer -->
                    <div class="footer">
                        {{template "footer" .}}
                        
                        <hr class="footer-divider">
                        
                        <div class="footer-links">
                            <a href="{{.AppURL}}/settings/notifications">Preferences</a>
                            <a href="{{.AppURL}}/help">Help</a>
                            <a href="{{.AppURL}}/privacy">Privacy</a>
                        </div>
                        
                        <p>© {{.Year}} OSA. All rights reserved.</p>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
