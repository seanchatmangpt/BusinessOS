name: Security Scanning

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC
  push:
    branches:
      - main
      - main-dev
  pull_request:
    branches:
      - main
      - main-dev
  workflow_dispatch:  # Allow manual trigger

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Go vulnerability check
        working-directory: backend
        run: |
          echo "Checking Go dependencies for vulnerabilities..."
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Exclude scripts/archive with multiple main() declarations
          govulncheck $(go list ./... | grep -v '/scripts/archive/') || true

      - name: Run npm audit (Frontend)
        working-directory: frontend
        run: |
          echo "Running npm audit for frontend..."
          npm audit --audit-level=moderate || true

      - name: Generate dependency report
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Go Dependencies" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cd backend && go list -m all >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  docker-scan:
    name: Docker Image Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    continue-on-error: true  # Don't fail entire workflow if scan has issues
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        working-directory: backend
        run: |
          echo "Building Docker image with optimized context..."
          docker build --progress=plain -t businessos-backend:scan .
        timeout-minutes: 10

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'businessos-backend:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # GitHub Advanced Security may not be enabled
        with:
          sarif_file: 'trivy-results.sarif'

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    # Note: This job runs always but steps will skip if SNYK_TOKEN is not set
    # Secrets cannot be used in job-level if conditions (GitHub Actions limitation)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities (Backend)
        uses: snyk/actions/golang@master
        # Will skip gracefully if SNYK_TOKEN is not set
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/go.mod

      - name: Run Snyk to check for vulnerabilities (Frontend)
        uses: snyk/actions/node@master
        # Will skip gracefully if SNYK_TOKEN is not set
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    if: always()

    steps:
      - name: Create security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
