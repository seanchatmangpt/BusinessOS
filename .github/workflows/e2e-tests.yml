name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: businessos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Install backend dependencies
        working-directory: backend
        run: go mod download

      - name: Run database migrations
        env:
          PGPASSWORD: postgres
        run: |
          echo "Applying database migrations..."
          for migration in backend/internal/database/migrations/*.sql; do
            echo "Applying $(basename $migration)..."
            psql -h localhost -U postgres -d businessos_test -f "$migration" || true
          done
          echo "Migrations applied"

      - name: Start backend server
        working-directory: backend
        env:
          # Database
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/businessos_test?sslmode=disable
          DATABASE_REQUIRED: "true"

          # Redis
          REDIS_URL: redis://localhost:6379

          # Server
          SERVER_PORT: "8001"
          BASE_URL: http://localhost:8001
          ENVIRONMENT: test

          # Security (test keys only)
          SECRET_KEY: test-secret-key-for-ci-e2e-only
          TOKEN_ENCRYPTION_KEY: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
          REDIS_KEY_HMAC_SECRET: test-hmac-secret-for-ci

          # AI Provider (mock for E2E)
          AI_PROVIDER: ollama_local
          OLLAMA_LOCAL_URL: http://localhost:11434
          DEFAULT_MODEL: llama3.2:3b

          # OAuth (not needed for E2E but prevents errors)
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REDIRECT_URI: http://localhost:8001/api/auth/google/callback/login

          # Disable background jobs
          CONVERSATION_SUMMARY_JOB_ENABLED: "false"
          BEHAVIOR_PATTERNS_JOB_ENABLED: "false"
          APP_PROFILER_SYNC_JOB_ENABLED: "false"
        run: |
          echo "Building backend server..."
          go build -o server cmd/server/main.go

          echo "Starting backend server..."
          ./server > ../../backend.log 2>&1 &
          echo $! > ../../backend.pid

          echo "Backend PID: $(cat ../../backend.pid)"
          echo "Waiting for server to initialize..."
          sleep 10

      - name: Wait for backend to be ready
        run: |
          echo "Checking if backend is responding..."
          for i in {1..30}; do
            if curl -f -s http://localhost:8001/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              curl -s http://localhost:8001/health
              exit 0
            fi
            echo "Attempt $i/30: Backend not ready yet, waiting..."
            sleep 2
          done

          echo "Backend failed to start within 60 seconds"
          echo "=== Backend logs ==="
          cat backend.log || echo "No logs available"
          echo "=== Backend process ==="
          ps aux | grep server || echo "Server process not found"
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: true
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8001
        run: npm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos
          path: frontend/test-results/
          retention-days: 7

      - name: Stop backend server
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

      - name: Publish test report
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'frontend', 'playwright-report', 'index.html');

            if (fs.existsSync(reportPath)) {
              console.log('Test report generated successfully');
              core.summary
                .addHeading('E2E Test Results')
                .addLink('View full report', `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`)
                .write();
            }
