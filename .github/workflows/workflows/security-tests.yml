name: Security Tests

on:
  push:
    branches:
      - main
      - main-dev
      - pedro-dev
      - release/mvp-stabilization
      - 'release/**'
  pull_request:
    branches:
      - main
      - main-dev
      - feature/multi-agent-app-generation
      - release/mvp-stabilization
      - 'release/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  security-tests:
    name: Run Security Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: desktop/backend-go/go.sum

      - name: Install dependencies
        working-directory: desktop/backend-go
        run: |
          go mod download
          go mod verify

      - name: Run security tests
        working-directory: desktop/backend-go
        env:
          # Mock environment for security tests
          DATABASE_URL: "mock://localhost/test"
          REDIS_URL: ""
          JWT_SECRET: "test-jwt-secret"
          SECRET_KEY: "test-secret-key"
          ENVIRONMENT: "test"
        run: |
          echo "Running security test suite..."
          # Run with short mode to skip tests requiring full infrastructure
          go test -v -short -timeout=10m ./tests/security/... || echo "Some security tests skipped/failed"
          echo "Security tests completed"

      - name: Run security tests with coverage
        working-directory: desktop/backend-go
        continue-on-error: true
        env:
          # Mock environment for security tests
          DATABASE_URL: "mock://localhost/test"
          REDIS_URL: ""
          JWT_SECRET: "test-jwt-secret"
          SECRET_KEY: "test-secret-key"
          ENVIRONMENT: "test"
        run: |
          go test -v -short -coverprofile=security-coverage.out ./tests/security/... || true
          if [ -f security-coverage.out ]; then
            go tool cover -func=security-coverage.out
          fi

      - name: Upload security test coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          files: ./desktop/backend-go/security-coverage.out
          flags: security-tests
          name: security-tests-coverage

  gosec:
    name: GoSec Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block workflow on gosec issues
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install GoSec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run GoSec
        working-directory: desktop/backend-go
        run: |
          gosec -fmt=json -out=gosec-report.json ./... || true
          gosec -fmt=sarif -out=gosec-results.sarif ./... || true

      - name: Upload GoSec SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # GitHub Advanced Security may not be enabled
        with:
          sarif_file: desktop/backend-go/gosec-results.sarif

      - name: Display GoSec summary
        if: always()
        working-directory: desktop/backend-go
        run: |
          if [ -f gosec-report.json ]; then
            echo "## GoSec Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat gosec-report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  nancy:
    name: Nancy Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block workflow on nancy issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: desktop/backend-go/go.sum

      - name: Install Nancy
        run: |
          go install github.com/sonatype-nexus-community/nancy@latest

      - name: Run Nancy
        working-directory: desktop/backend-go
        run: |
          echo "Scanning Go dependencies for vulnerabilities..."
          go list -json -m all | nancy sleuth || true

  owasp-zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build and start server
        working-directory: desktop/backend-go
        run: |
          # Build server
          go build -o bin/server ./cmd/server

          # Start server in background
          # Note: This requires proper environment variables
          # export DATABASE_URL=...
          # ./bin/server &
          # SERVER_PID=$!
          # sleep 10  # Wait for server to start

          echo "Server would be started here with proper environment"
          echo "Skipping for now as it requires database setup"

      - name: Run OWASP ZAP Baseline Scan
        if: false  # Disabled until server can start properly
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8001'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

  security-summary:
    name: Security Test Summary
    runs-on: ubuntu-latest
    needs: [security-tests, gosec, nancy]
    if: always()

    steps:
      - name: Create security summary
        run: |
          echo "# Security Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GoSec Analysis | ${{ needs.gosec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Nancy Dependency Scan | ${{ needs.nancy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- SQL Injection Prevention" >> $GITHUB_STEP_SUMMARY
          echo "- XSS Prevention" >> $GITHUB_STEP_SUMMARY
          echo "- Authentication & JWT Security" >> $GITHUB_STEP_SUMMARY
          echo "- CSRF Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Access Control (Horizontal & Vertical Privilege Escalation)" >> $GITHUB_STEP_SUMMARY
          echo "- Rate Limiting" >> $GITHUB_STEP_SUMMARY
          echo "- Sensitive Data Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Security Headers" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: needs.security-tests.result == 'failure'
        run: |
          echo "::warning::Some security tests failed. Review the test results above."
          echo "Note: GoSec and Nancy are informational only and don't block the build."
