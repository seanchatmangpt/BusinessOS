# ═══════════════════════════════════════════════════════════════════════════════
# DEVELOPMENT MINIMAL ONTOLOGY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Lightweight configuration for local development with essential ontologies only.
# Enables faster startup, lower memory footprint, and minimal dependencies.
#
# Environment: development
# Created: 2026-03-25
# Purpose: Quick iteration and feature development

apiVersion: "ontology.chatmangpt.com/v1"
kind: "OntologyConfig"

metadata:
  name: "dev-minimal"
  environment: "development"
  version: "1.0.0"
  description: "Minimal development ontology configuration with core ontologies only"
  created_at: "2026-03-25T00:00:00Z"
  updated_at: "2026-03-25T00:00:00Z"

spec:
  # Minimal framework support for development
  frameworks:
    compliance:
      soc2: false
      hipaa: false
      gdpr: false
      sox: false
    domains:
      commerce: true
      operations: true
      people: false
      finance: false
      analytics: false
    extended:
      fibo: false
      healthcare: false
      research: false

  # Core ontologies for development
  ontologies:
    # Core: Enterprise sales ontology
    - name: sales_ontology
      iri: "https://ontology.chatmangpt.com/sales/v1"
      version: "1.2.0"
      required: true
      enabled: true
      alias: "sales"
      frameworks:
        - commerce
      description: "Sales and customer management domain model"
      validation:
        entity_count_min: 3
        relationship_count_min: 2

    # Core: Business operations
    - name: operations_ontology
      iri: "https://ontology.chatmangpt.com/operations/v1"
      version: "1.0.0"
      required: true
      enabled: true
      alias: "ops"
      frameworks:
        - operations
      description: "Business process and operations domain model"
      validation:
        entity_count_min: 5
        relationship_count_min: 5

    # Optional: Simple analytics
    - name: analytics_basic
      iri: "https://ontology.chatmangpt.com/analytics/basic/v1"
      version: "1.0.0"
      required: false
      enabled: true
      alias: "analytics"
      frameworks:
        - analytics
      description: "Basic analytics metrics and KPIs"

  # Namespace aliases for SPARQL queries
  namespaces:
    sales: "https://ontology.chatmangpt.com/sales/v1"
    ops: "https://ontology.chatmangpt.com/operations/v1"
    analytics: "https://ontology.chatmangpt.com/analytics/basic/v1"
    xsd: "http://www.w3.org/2001/XMLSchema#"
    rdf: "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
    rdfs: "http://www.w3.org/2000/01/rdf-schema#"

  # Environment overrides (none for dev-minimal)
  environments:
    development:
      enabled_ontologies:
        - sales_ontology
        - operations_ontology
        - analytics_basic

  # Minimal validation for development
  validation:
    strict: false
    on_missing_required: "error"
    on_version_mismatch: "warn"
    on_circular_dependency: "error"
