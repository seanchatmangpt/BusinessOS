---
# CC6: Logical and Physical Access Controls
rule:
  id: soc2.cc6.1
  framework: SOC2
  control_id: CC6.1
  title: "User Access Control - Role Assignment"
  description: |
    Verify that all users have assigned roles and that access reviews
    are conducted at least quarterly to ensure appropriateness of access levels.
    This control ensures the principle of least privilege is maintained.
  severity: high
  enabled: true

  condition:
    type: compound
    operator: AND
    checks:
      - type: audit
        query: "action == 'user_access_review' AND timestamp > now-90d"
        expect: "count >= 1"
      - type: state
        check_name: "all_users_have_roles"
        expected: true
      - type: capability
        capability: "rbac_enabled"
        service: "auth"
        expected: true

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "high"
      - type: notify
        channels: ["security-team"]
        template: "cc6.1_violation"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_days: 30
      - type: audit
        audit_type: "compliance_rule_violation"
        log_details: true

  metadata:
    tags: ["identity", "access-control", "critical-control"]
    owner: "security-team"
    last_updated: "2026-03-24"
    mapping:
      aws_control: "IAM-1"
      cis_control: "5.1"
      nist_csf: "PR.AC-1"
    evidence_artifacts:
      - "access_review_report.pdf"
      - "role_assignment_audit.csv"
      - "user_list_with_roles.json"

---
rule:
  id: soc2.cc6.2
  framework: SOC2
  control_id: CC6.2
  title: "User Provisioning and Deprovisioning"
  description: |
    Implement and maintain a formal process for provisioning new users
    and deprovisioning terminated employees within 24 hours. Ensure all
    system access is revoked upon termination.
  severity: high
  enabled: true

  condition:
    type: compound
    operator: AND
    checks:
      - type: audit
        query: "action == 'user_provisioned' AND timestamp > now-30d"
        expect: "count >= 1"
      - type: audit
        query: "action == 'user_deprovisioned' AND timestamp > now-30d"
        expect: "count >= 1"

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "high"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_days: 7
      - type: audit
        audit_type: "compliance_rule_violation"
        log_details: true

  metadata:
    tags: ["identity", "lifecycle-management"]
    owner: "hr-security-team"
    last_updated: "2026-03-24"
    mapping:
      aws_control: "IAM-4"
      cis_control: "5.2"

---
# CC7: Systems Monitoring and Operations
rule:
  id: soc2.cc7.1
  framework: SOC2
  control_id: CC7.1
  title: "IT Operations Governance"
  description: |
    Establish governance over IT operations and infrastructure management,
    including change control procedures, incident management, and operations monitoring.
  severity: medium
  enabled: true

  condition:
    type: state
    check_name: "change_management_enabled"
    expected: true

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "medium"
      - type: audit
        audit_type: "compliance_rule_violation"

  metadata:
    tags: ["operations", "change-management"]
    owner: "devops-team"
    last_updated: "2026-03-24"

---
rule:
  id: soc2.cc7.2
  framework: SOC2
  control_id: CC7.2
  title: "System Monitoring and Alerting"
  description: |
    Implement system monitoring and alerting to detect unusual or suspicious
    activity. Alert thresholds must be reviewed quarterly and adjusted based on
    evolving threat landscape.
  severity: medium
  enabled: true

  condition:
    type: audit
    query: "action == 'alert_triggered' AND timestamp > now-7d"
    expect: "count >= 5"

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "medium"
      - type: notify
        channels: ["security-team", "soc"]
        template: "cc7.2_low_alert_volume"
      - type: audit
        audit_type: "compliance_rule_violation"

  metadata:
    tags: ["monitoring", "siem"]
    owner: "security-operations-team"
    last_updated: "2026-03-24"

---
rule:
  id: soc2.cc7.3
  framework: SOC2
  control_id: CC7.3
  title: "Backup and Recovery Testing"
  description: |
    Perform regular backup and disaster recovery testing at least quarterly
    to ensure data recoverability. Document all test results and remediate failures.
  severity: high
  enabled: true

  condition:
    type: audit
    query: "action == 'backup_test_completed' AND timestamp > now-30d"
    expect: "count >= 1"

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "high"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_days: 14
      - type: audit
        audit_type: "compliance_rule_violation"

  metadata:
    tags: ["disaster-recovery", "data-protection"]
    owner: "backup-team"
    last_updated: "2026-03-24"

---
# A1: Availability
rule:
  id: soc2.a1.1
  framework: SOC2
  control_id: A1.1
  title: "System Availability and Performance"
  description: |
    Maintain systems and infrastructure to meet defined availability targets
    (typically 99.95% uptime for SaaS). Monitor uptime and respond to outages
    according to incident severity.
  severity: critical
  enabled: true

  condition:
    type: capability
    capability: "uptime_monitoring"
    service: "infrastructure"
    expected: true

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "critical"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_hours: 2
      - type: audit
        audit_type: "compliance_rule_violation"
        log_details: true

  metadata:
    tags: ["availability", "sla"]
    owner: "infrastructure-team"
    last_updated: "2026-03-24"

---
# C1: Confidentiality
rule:
  id: soc2.c1.1
  framework: SOC2
  control_id: C1.1
  title: "Encryption of Data at Rest"
  description: |
    Encrypt all sensitive data while at rest using strong encryption algorithms
    (AES-256 minimum). Encryption keys must be managed securely and backed up
    according to key management policy.
  severity: critical
  enabled: true

  condition:
    type: state
    check_name: "encryption_at_rest"
    expected: true

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "critical"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_hours: 1
      - type: notify
        channels: ["security-team", "infrastructure-team"]
        template: "encryption_at_rest_missing"
      - type: audit
        audit_type: "compliance_rule_violation"
        log_details: true

  metadata:
    tags: ["encryption", "data-protection"]
    owner: "security-architecture-team"
    last_updated: "2026-03-24"
    mapping:
      aws_control: "SEC-2"
      cis_control: "3.11"

---
rule:
  id: soc2.c1.2
  framework: SOC2
  control_id: C1.2
  title: "Encryption in Transit (TLS 1.3)"
  description: |
    Enforce TLS 1.3 or higher for all data in transit. Disable legacy TLS
    versions and weak ciphers. Implement HSTS for web applications.
  severity: critical
  enabled: true

  condition:
    type: audit
    query: "action == 'tls_handshake' AND tls_version == '1.3' AND timestamp > now-7d"
    expect: "count >= 100"

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "critical"
      - type: escalate
        escalate_to: "ciso"
        if_unresolved_hours: 4
      - type: audit
        audit_type: "compliance_rule_violation"
        log_details: true

  metadata:
    tags: ["encryption", "tls"]
    owner: "security-operations-team"
    last_updated: "2026-03-24"

---
# I1: Integrity
rule:
  id: soc2.i1.1
  framework: SOC2
  control_id: I1.1
  title: "Change Management Process"
  description: |
    Implement formal change management requiring documentation, approval, and
    testing before deploying to production. Include rollback procedures and
    post-deployment validation.
  severity: high
  enabled: true

  condition:
    type: compound
    operator: AND
    checks:
      - type: audit
        query: "action IN ['change_approved', 'change_deployed'] AND timestamp > now-7d"
        expect: "count >= 1"
      - type: state
        check_name: "change_management_enabled"
        expected: true

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "high"
      - type: audit
        audit_type: "compliance_rule_violation"

  metadata:
    tags: ["change-control", "deployment"]
    owner: "devops-team"
    last_updated: "2026-03-24"

---
# P1: Privacy
rule:
  id: soc2.p1.1
  framework: SOC2
  control_id: P1.1
  title: "Privacy Policy and Disclosure"
  description: |
    Maintain and publish a privacy policy describing collection, use, retention,
    and protection of customer personal data. Make policy readily available and
    update annually or when practices change.
  severity: medium
  enabled: true

  condition:
    type: audit
    query: "action == 'privacy_policy_reviewed' AND timestamp > now-365d"
    expect: "count >= 1"

  action:
    auto_remediate: false
    if_violated:
      - type: create_gap
        gap_status: "open"
        priority: "medium"
      - type: notify
        channels: ["legal-team", "compliance-officer"]
        template: "privacy_policy_update_due"
      - type: audit
        audit_type: "compliance_rule_violation"

  metadata:
    tags: ["privacy", "gdpr", "disclosure"]
    owner: "legal-compliance-team"
    last_updated: "2026-03-24"

---
