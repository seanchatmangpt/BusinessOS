# Migrations are applied in order
# Each migration must have:
#   - version: sequential number (001, 002, 003...)
#   - name: descriptive title
#   - checksum: SHA256 of up.sql file (prevents accidental edits)
#   - description: what changed
#   - breaking: boolean (true if breaking change)
#   - dependencies: list of migrations this depends on (usually all prior ones)

