# Rollback strategy:
# - Each migration has a corresponding rollback_NNN.sql file
# - Rollbacks must be idempotent (safe to run multiple times)
# - Rollbacks run in REVERSE order (010, 009, 008, ... 001)
# - Data loss: rollbacks are destructive, always backup before rolling back

# Migration best practices:
# 1. One logical change per migration
# 2. Always write down.sql before running up.sql
# 3. Test rollback in staging before production
# 4. Never modify a migration after it's been applied to production
# 5. Large schema changes: break into smaller migrations
# 6. Data migrations: always include data backup steps

# Performance implications:
# - CREATE INDEX CONCURRENTLY: can run without blocking
# - ALTER TABLE: blocks writes during lock phase (use low-traffic window)
# - DROP INDEX: fast, can run anytime
# - CONSTRAINT changes: may lock table, schedule maintenance window

# Monitoring:
# - Check schema_migrations table: SELECT * FROM schema_migrations ORDER BY applied_at
# - Monitor locks during migration: SELECT * FROM pg_locks WHERE NOT granted
# - Check slow queries: pg_stat_statements
# - Rollback monitoring: DELETE FROM schema_migrations WHERE version = 'NNN'
