<!DOCTYPE html>
<html>
<head>
    <title>Microphone Test</title>
    <style>
        body {
            font-family: system-ui;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }
        #log {
            background: #f5f5f5;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Microphone Test</h1>
    <p>Click the button below to test microphone access:</p>

    <button onclick="testMic()">🎤 Test Microphone</button>
    <button onclick="clearLog()">Clear Log</button>

    <div id="log"></div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testMic() {
            clearLog();
            log('🔍 Starting microphone test...', 'info');

            // Step 1: Check if getUserMedia is available
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log('❌ getUserMedia not supported in this browser', 'error');
                return;
            }
            log('✅ getUserMedia API is available', 'success');

            // Step 2: Enumerate devices BEFORE permission
            try {
                const devicesBefore = await navigator.mediaDevices.enumerateDevices();
                const micsBefore = devicesBefore.filter(d => d.kind === 'audioinput');
                log(`📱 Found ${micsBefore.length} audio input devices (before permission)`, 'info');
                micsBefore.forEach((d, i) => {
                    log(`  [${i}] ${d.label || 'Unnamed'} (${d.deviceId.substring(0, 20)}...)`, 'info');
                });
            } catch (e) {
                log(`⚠️ Could not enumerate devices: ${e.message}`, 'error');
            }

            // Step 3: Check permission state
            try {
                const permStatus = await navigator.permissions.query({ name: 'microphone' });
                log(`🔐 Permission status: ${permStatus.state}`, 'info');
            } catch (e) {
                log('ℹ️ Permission API not available', 'info');
            }

            // Step 4: Request microphone access
            log('🎤 Requesting microphone access...', 'info');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log('✅ SUCCESS! Microphone access granted!', 'success');

                const tracks = stream.getAudioTracks();
                log(`📊 Got ${tracks.length} audio track(s):`, 'success');
                tracks.forEach((track, i) => {
                    log(`  [${i}] ${track.label}`, 'success');
                    log(`      Enabled: ${track.enabled}`, 'info');
                    log(`      Muted: ${track.muted}`, 'info');
                    log(`      ReadyState: ${track.readyState}`, 'info');
                });

                // Stop the stream
                stream.getTracks().forEach(track => track.stop());
                log('🛑 Test stream stopped', 'info');

                // Step 5: Enumerate devices AFTER permission
                const devicesAfter = await navigator.mediaDevices.enumerateDevices();
                const micsAfter = devicesAfter.filter(d => d.kind === 'audioinput');
                log(`📱 Found ${micsAfter.length} audio input devices (after permission):`, 'info');
                micsAfter.forEach((d, i) => {
                    log(`  [${i}] ${d.label || 'Unnamed'} (${d.deviceId.substring(0, 20)}...)`, 'info');
                });

                log('✅ MICROPHONE TEST PASSED!', 'success');

            } catch (error) {
                log(`❌ MICROPHONE TEST FAILED!`, 'error');
                log(`Error name: ${error.name}`, 'error');
                log(`Error message: ${error.message}`, 'error');

                if (error.name === 'NotFoundError') {
                    log('💡 This means no microphone hardware was found', 'error');
                    log('   Check: System Settings → Sound → Input', 'error');
                } else if (error.name === 'NotAllowedError') {
                    log('💡 This means permission was denied', 'error');
                    log('   Check: System Settings → Privacy & Security → Microphone', 'error');
                    log('   Make sure your browser is in the list and enabled', 'error');
                } else if (error.name === 'NotReadableError') {
                    log('💡 This means the mic is in use by another app', 'error');
                    log('   Close other apps using the microphone', 'error');
                }
            }
        }

        // Auto-run test on load
        window.addEventListener('load', () => {
            log('Page loaded. Click "Test Microphone" button to begin', 'info');
        });
    </script>
</body>
</html>
