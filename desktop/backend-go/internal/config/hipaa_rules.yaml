# HIPAA Compliance Rules Configuration
# Phase 2B Agent 2 deliverable: HIPAA control rules (5 rules total)
# 
# Format:
#   id: Short identifier (AC-1, ER-1, etc.)
#   name: Human-readable name
#   description: What this rule enforces
#   severity: CRITICAL, HIGH, MEDIUM, LOW
#   patterns: List of condition patterns this rule evaluates

rules:
  - id: "AC-1"
    name: "Access Control"
    description: "Verify user permissions before granting access to PHI (Protected Health Information)"
    severity: "CRITICAL"
    patterns:
      - data.classification == "PHI"
        condition: "user.permissions.contains(data.classification)"
