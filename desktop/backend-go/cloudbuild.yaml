# Cloud Build configuration for deploying to Cloud Run
# Trigger this with: gcloud builds submit --config cloudbuild.yaml
#
# Prerequisites:
# 1. Create secrets in Secret Manager:
#    gcloud secrets create DATABASE_URL --data-file=-
#    gcloud secrets create GOOGLE_CLIENT_ID --data-file=-
#    gcloud secrets create GOOGLE_CLIENT_SECRET --data-file=-
#    gcloud secrets create SECRET_KEY --data-file=-
#    gcloud secrets create ANTHROPIC_API_KEY --data-file=-
#
# 2. Grant Cloud Run access to secrets:
#    gcloud secrets add-iam-policy-binding DATABASE_URL \
#      --member="serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"

substitutions:
  _SERVICE_NAME: businessos-api
  _REGION: us-central1
  _CLOUD_SQL_INSTANCE: ${PROJECT_ID}:us-central1:businessos-db

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'
      - '.'
    dir: 'backend-go'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,SERVER_PORT=8080,AI_PROVIDER=anthropic,ENABLE_LOCAL_MODELS=false'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SECRET_KEY=SECRET_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--update-env-vars'
      - 'GOOGLE_REDIRECT_URI=https://${_SERVICE_NAME}-${PROJECT_NUMBER}.${_REGION}.run.app/api/auth/google/callback/login'
      - '--update-env-vars'
      - 'ALLOWED_ORIGINS=https://businessos.app,app://localhost,http://localhost:5173'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'

images:
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
  - 'gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest'

timeout: '1200s'
