# =============================================================================
# OpenTelemetry Collector Configuration
# Receives OTLP spans from all services, exports to Jaeger via OTLP.
#
# Note: The legacy "jaeger" exporter (gRPC port 14250) was removed in
# collector v0.86.0+. Jaeger all-in-one with COLLECTOR_OTLP_ENABLED=true
# accepts OTLP natively on port 4317 (gRPC) and 4318 (HTTP).
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Export traces to Jaeger via OTLP gRPC (Jaeger all-in-one accepts OTLP
  # natively when COLLECTOR_OTLP_ENABLED=true).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Export a copy of all spans to Weaver live-check for semantic convention
  # validation. Weaver listens on gRPC port 4316 inside the Docker network.
  # Validation results appear in weaver container logs and /reports/ volume.
  # Weaver live-check gRPC server does not accept gzip-compressed OTLP payloads
  # (collector default compression causes: "Content is compressed with gzip which isn't supported").
  otlp/weaver:
    endpoint: weaver-live-check:4316
    tls:
      insecure: true
    compression: none

  # Debug logging — useful during development to verify spans are flowing.
  debug:
    verbosity: basic

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger, otlp/weaver, debug]
